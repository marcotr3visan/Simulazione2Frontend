<div class="container py-5">
  <div class="row justify-content-center text-center mb-5">
    <div class="col-lg-8">
      <h1 class="display-5 fw-bold mb-3">Gestione Consegne Corriere Espresso</h1>
      
    </div>
  </div>

  <div class="row justify-content-center g-3 mb-5">
    <div class="col-12 col-md-auto">
      <a routerLink="/login" class="btn btn-primary w-100 px-4">
        Login operatore
      </a>
    </div>

    <div class="col-12 col-md-auto">
      <a routerLink="/register" class="btn btn-primary w-100 px-4">
        Registrazione operatore
      </a>
    </div>

    <div class="col-12 col-md-auto">
      <a routerLink="/tracking" class="btn btn-outline-primary w-100 px-4">
        Tracking pubblico
      </a>
    </div>

    <div class="col-12 col-md-auto" *ngIf="isLoggedIn()">
      <a routerLink="/dashboard" class="btn btn-success w-100 px-4">
        Vai alla dashboard
      </a>
    </div>
  </div>

  
</div>
